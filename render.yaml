services:
  - type: web
    name: agrohive-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free # or your preferred plan
    region: oregon # or your preferred region
    envVars:
      - key: DATABASE_URL
        sync: false # Neon connection string in Render Dashboard
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY_PATH
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: MAIL_FROM
        value: sultanabaniks@gmail.com
      - key: ALLOWED_ORIGINS
        value: https://agrohive.vercel.app,https://agrohive-admin.vercel.app,http://localhost:3000
      - key: GOOGLE_ANDROID_CLIENT_ID
        sync: false
      - key: GOOGLE_IOS_CLIENT_ID
        sync: false
      - key: GOOGLE_WEB_CLIENT_ID
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 1h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false